name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  structure:
    name: validate brain structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Required files present
        run: |
          set -e
          test -f README.md
          test -f _compact/YYYY-MMM-DD.har.compact.md
          echo "core files present"

      - name: Daily entry filenames are YYYY-MMM-DD.har.compact.md
        run: |
          set -e
          bad=0
          while IFS= read -r f; do
            base=$(basename "$f")
            if ! echo "$base" | grep -Eq '^[0-9]{4}-(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)-[0-9]{2}\.har\.compact\.md$'; then
              echo "::error file=$f::daily entry must be named YYYY-MMM-DD.har.compact.md"
              bad=1
            fi
          done < <(find projects -type f -name '*.har.compact.md' 2>/dev/null)
          exit $bad

      - name: Every project folder has a README index
        run: |
          set -e
          bad=0
          for d in projects/*/; do
            [ -d "$d" ] || continue
            if [ ! -f "${d}README.md" ]; then
              echo "::error::missing ${d}README.md"
              bad=1
            fi
          done
          exit $bad
